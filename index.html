<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Guepe 3D Interactive</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/aframe-gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler/master/dist/aframe-gesture-handler.js"></script>
    
    <style>
      #info-panel {
        position: fixed; 
        bottom: 30px; 
        left: 50%; 
        transform: translateX(-50%);
        width: 85%; 
        /* Effet Glassmorphism */
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: white;
        padding: 20px; 
        border-radius: 20px; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center; 
        z-index: 999; 
        border: 1px solid rgba(255, 204, 0, 0.3);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }
      h2 { 
        margin: 0; 
        color: #ffcc00; 
        font-size: 20px; 
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      p { 
        margin: 10px 0 0; 
        font-size: 14px; 
        line-height: 1.4;
        opacity: 0.9;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="info-panel">
      <h2>Vespa Crabro</h2>
      <p><b>Observation anatomique</b><br>Pince pour zoomer, glisse pour pivoter.<br>Projet pédagogique - Moulin de Brousses</p>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; uiEnabled: false;"
      vr-mode-ui="enabled: false"
      gesture-detector>
      
      <a-assets>
        <a-asset-item id="wasp" src="Mesh_Wasp.glb"></a-asset-item>
      </a-assets>

      <a-entity
        gltf-model="#wasp"
        position="0 0 -2"
        scale="0.04 0.04 0.04"
        class="clickable"
        gesture-handler="rotationFactor: 1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear">
      </a-entity>

      <a-entity camera>
        <a-entity cursor="fuse: false; rayOrigin: mouse;"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
