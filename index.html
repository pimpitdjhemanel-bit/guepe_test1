<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Chasse à la Guêpe AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* Interface utilisateur type Pokémon GO */
      #ui-panel {
        position: fixed; 
        bottom: 30px; 
        left: 50%; 
        transform: translateX(-50%);
        width: 85%; 
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: white;
        padding: 15px 20px; 
        border-radius: 20px; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center; 
        z-index: 999; 
        border: 2px solid #ffcc00;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      h2 { margin: 0; color: #ffcc00; font-size: 20px; text-transform: uppercase; }
      p { margin: 10px 0 0; font-size: 15px; font-weight: bold; }
      .instruction { font-size: 12px; font-weight: normal; opacity: 0.8; margin-top: 5px; }
      
      /* Écran de chargement pour le GPS */
      #loader {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.9);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        font-family: sans-serif;
      }
    </style>

    <script>
      // Composant custom pour gérer la logique du jeu
      AFRAME.registerComponent('wasp-game-logic', {
        init: function () {
          this.waspCoords = null;
          this.captured = false;
          
          const loader = document.getElementById('loader');
          const distanceText = document.getElementById('distance-text');
          const waspWrapper = document.getElementById('wasp-wrapper');
          const waspModel = document.getElementById('wasp-model');

          // 1. Obtenir la position GPS de l'utilisateur au démarrage
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
              const userLat = position.coords.latitude;
              const userLon = position.coords.longitude;

              // 2. Générer une position aléatoire autour (approx. 10 à 30 mètres)
              // 0.0003 degrés équivaut environ à 30 mètres
              const latOffset = (Math.random() - 0.5) * 0.0004; 
              const lonOffset = (Math.random() - 0.5) * 0.0004;
              
              const targetLat = userLat + latOffset;
              const targetLon = userLon + lonOffset;
              this.waspCoords = { lat: targetLat, lon: targetLon };

              // 3. Placer la guêpe dans le monde réel
              waspWrapper.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLon}`);
              
              // Cacher le loader
              loader.style.display = 'none';

            }, (error) => {
              alert("Erreur GPS : Veuillez autoriser la localisation.");
            }, { enableHighAccuracy: true });
          }

          // 4. Mettre à jour la distance quand le GPS de l'utilisateur bouge
          window.addEventListener('gps-camera-update-position', (e) => {
            if (this.captured || !this.waspCoords) return;

            const currentLat = e.detail.position.latitude;
            const currentLon = e.detail.position.longitude;
            
            // Calcul de la distance
            const distance = this.calculateDistance(currentLat, currentLon, this.waspCoords.lat, this.waspCoords.lon);
            
            distanceText.innerText = `Distance : ${distance.toFixed(1)} mètres`;

            // Rendre la guêpe "visible" seulement si on est à moins de 40 mètres
            if (distance < 40) {
                waspWrapper.setAttribute('visible', 'true');
            } else {
                waspWrapper.setAttribute('visible', 'false');
                distanceText.innerText += " (Trop loin !)";
            }
          });

          // 5. Gérer la capture (clic/touch)
          waspModel.addEventListener('click', () => {
            if (this.captured) return;
            this.captured = true;
            
            // Animation de disparition (scale down)
            waspModel.setAttribute('animation__capture', 'property: scale; to: 0 0 0; dur: 500; easing: easeInBack');
            
            // Mettre à jour l'UI
            distanceText.innerText = "🎉 Guêpe capturée !";
            distanceText.style.color = "#00ff00";
          });
        },

        // Formule de Haversine pour calculer la distance entre deux points GPS
        calculateDistance: function(lat1, lon1, lat2, lon2) {
          const R = 6371e3; // Rayon de la Terre en mètres
          const φ1 = lat1 * Math.PI/180;
          const φ2 = lat2 * Math.PI/180;
          const Δφ = (lat2-lat1) * Math.PI/180;
          const Δλ = (lon2-lon1) * Math.PI/180;

          const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          return R * c; 
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="loader">
      <h2>Acquisition GPS...</h2>
      <p>Assurez-vous d'être à l'extérieur.</p>
    </div>

    <div id="ui-panel">
      <h2>Radar à Guêpe</h2>
      <p id="distance-text">Recherche du signal...</p>
      <div class="instruction">Déplace-toi physiquement. Touche la guêpe pour la capturer !</div>
    </div>

    <a-scene 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      cursor="rayOrigin: mouse; fuse: false"
      raycaster="objects: .clickable"
      wasp-game-logic> <a-assets>
        <a-asset-item id="wasp" src="Mesh_Wasp.glb"></a-asset-item>
      </a-assets>

      <a-entity id="wasp-wrapper" visible="false">
        
        <a-entity
          id="wasp-model"
          gltf-model="#wasp"
          scale="0.04 0.04 0.04"
          class="clickable"
          look-at="[gps-camera]"
          animation="property: position; to: 0 0.5 0; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-entity>

      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>
      
    </a-scene>
  </body>
</html>
