<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Guepe 3D Interactive</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/aframe-gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler/master/dist/aframe-gesture-handler.js"></script>
    
    <style>
      #info-panel {
        position: fixed; 
        bottom: 30px; 
        left: 50%; 
        transform: translateX(-50%);
        width: 80%; 
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: white;
        padding: 15px; 
        border-radius: 15px; 
        font-family: sans-serif;
        text-align: center; 
        z-index: 999; 
        border: 1px solid #ffcc00;
      }
      h2 { margin: 0; color: #ffcc00; font-size: 18px; text-transform: uppercase; }
      p { margin: 5px 0 0; font-size: 13px; opacity: 0.8; }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="info-panel">
      <h2>Modèle Interactif : Guêpe</h2>
      <p>Fais glisser pour pivoter • Pince pour zoomer</p>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; uiEnabled: false;"
      vr-mode-ui="enabled: false"
      gesture-detector>
      
      <a-assets>
        <a-asset-item id="wasp" src="Mesh_Wasp.glb"></a-asset-item>
      </a-assets>

      <a-entity
        gltf-model="#wasp"
        position="0 0 -2"
        scale="0.04 0.04 0.04"
        class="clickable"
        gesture-handler="rotationFactor: 1; minScale: 0.01; maxScale: 0.1">
      </a-entity>

      <a-entity camera>
        <a-entity cursor="fuse: false; rayOrigin: mouse;"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
